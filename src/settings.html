<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Settings</title>
    <script type="module" src="settings.js" defer></script>
  </head>
  <body>
    <div class="app">
      <div class="noise" aria-hidden="true"></div>

      <section class="screen">
        <!-- header: back arrow + title + bottom hairline -->
        <header class="s-header">
          <button class="back" id="back-btn" title="Back" aria-label="Back">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
              <path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="s-header__title">Settings</div>
        </header>

        <div class="s-body">
          <!-- behavior toggles -->
          <div class="eyebrow">BEHAVIOR</div>
          <div class="toggles" id="toggles">
            <div class="toggle-row" data-key="closeSteam">
              <span class="toggle-row__label">Close Steam before switching</span>
              <button class="pill on" role="switch" aria-checked="true"><span class="pill__knob"></span></button>
            </div>
            <div class="toggle-row" data-key="launchMin">
              <span class="toggle-row__label">Launch Steam minimized</span>
              <button class="pill" role="switch" aria-checked="false"><span class="pill__knob"></span></button>
            </div>
            <div class="toggle-row" data-key="startWin">
              <span class="toggle-row__label">Start with Windows</span>
              <button class="pill" role="switch" aria-checked="false"><span class="pill__knob"></span></button>
            </div>
          </div>

          <!-- steam install path -->
          <div class="eyebrow">STEAM INSTALL PATH</div>
          <div class="path-row">
            <div class="path-field">
              <svg class="path-field__icon" viewBox="0 0 24 24" width="15" height="15" fill="none">
                <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              </svg>
              <span class="path-field__text">C:\Program Files (x86)\Steam</span>
            </div>
            <button class="browse" id="browse-btn">Browse</button>
          </div>

          <!-- theme accent -->
          <div class="eyebrow">THEME ACCENT</div>
          <div class="accents" id="accents">
            <button class="dot selected" data-rgb="102,192,244" style="--c:#66c0f4" aria-label="Blue"></button>
            <button class="dot" data-rgb="164,208,7" style="--c:#a4d007" aria-label="Green"></button>
            <button class="dot" data-rgb="177,140,255" style="--c:#b18cff" aria-label="Purple"></button>
            <button class="dot" data-rgb="244,162,89" style="--c:#f4a259" aria-label="Orange"></button>
          </div>

          <!-- about -->
          <div class="eyebrow">ABOUT</div>
          <div class="about">
            <div class="about__title">Steam Acc Switcher</div>
            <div class="about__sub">v1.0.0 · Made for gamers</div>
          </div>
        </div>

        <!-- pinned glassy footer -->
        <footer class="s-footer">
          <button class="save-btn" id="save-btn">Save</button>
        </footer>
      </section>
    </div>
  </body>
</html>

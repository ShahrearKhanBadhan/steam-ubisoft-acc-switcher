<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Steam Acc Switcher</title>
    <script type="module" src="main.js" defer></script>
  </head>
  <body>
    <div class="app">
      <!-- faint fractal-noise texture overlay -->
      <div class="noise" aria-hidden="true"></div>

      <!-- custom title bar (OS drag region) -->
      <div class="titlebar" data-tauri-drag-region>
        <span class="titlebar__label" data-tauri-drag-region>STEAM</span>
        <div class="titlebar__controls">
          <button class="tbdot tbdot--min" id="min-btn" title="Minimize" aria-label="Minimize">
            <svg viewBox="0 0 10 10" width="7" height="7" fill="none">
              <path d="M2 5h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="tbdot tbdot--close" id="close-btn" title="Close" aria-label="Close">
            <svg viewBox="0 0 10 10" width="7" height="7" fill="none">
              <path d="M2.5 2.5l5 5M7.5 2.5l-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- sliding screen stack -->
      <div class="screens" id="screens">
        <!-- ===================== MAIN ===================== -->
        <section class="screen screen--main" id="main-screen">
          <header class="m-header">
            <div class="logo" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
                <circle cx="8.5" cy="15" r="4.6" stroke="#fff" stroke-width="1.6"/>
                <circle cx="8.5" cy="15" r="1.7" fill="#fff"/>
                <path d="M9.8 12.2 17 6.4" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
                <circle cx="15.6" cy="7.6" r="2.5" stroke="#fff" stroke-width="1.5"/>
                <circle cx="19" cy="9.3" r="1.5" fill="#fff"/>
              </svg>
            </div>
            <div class="m-header__titles">
              <div class="m-header__title">Account Switcher</div>
              <div class="m-header__sub" id="account-count">6 accounts linked</div>
            </div>
            <button class="gear" id="gear-btn" title="Settings" aria-label="Settings">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
                <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.6"/>
                <path d="M19.4 13a7.6 7.6 0 0 0 .05-2l1.7-1.3-1.7-2.9-2 .8a7.6 7.6 0 0 0-1.74-1l-.3-2.1H11.2l-.3 2.1c-.62.25-1.2.59-1.74 1l-2-.8-1.7 2.9L7.16 11a7.6 7.6 0 0 0 0 2l-1.7 1.3 1.7 2.9 2-.8c.53.42 1.12.76 1.74 1l.3 2.1h3.5l.3-2.1c.62-.25 1.2-.59 1.74-1l2 .8 1.7-2.9L19.4 13Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
              </svg>
            </button>
          </header>

          <!-- active account banner (rendered by JS) -->
          <div class="banner" id="banner"></div>

          <div class="eyebrow eyebrow--list">SWITCH TO</div>

          <!-- scrollable account list (rendered by JS) -->
          <div class="list" id="list"></div>

          <footer class="m-footer">
            <button class="add-btn" id="add-btn">+ Add Account</button>
            <span class="version">v1.0.0</span>
          </footer>
        </section>

        <!-- =================== SETTINGS =================== -->
        <section class="screen screen--settings" id="settings-screen">
          <header class="s-header">
            <button class="back" id="back-btn" title="Back" aria-label="Back">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
                <path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <div class="s-header__title">Settings</div>
          </header>

          <div class="s-body">
            <div class="eyebrow">BEHAVIOR</div>
            <div class="toggles" id="toggles">
              <div class="toggle-row" data-key="closeSteam">
                <span class="toggle-row__label">Close Steam before switching</span>
                <button class="pill on" role="switch" aria-checked="true"><span class="pill__knob"></span></button>
              </div>
              <div class="toggle-row" data-key="launchMin">
                <span class="toggle-row__label">Launch Steam minimized</span>
                <button class="pill" role="switch" aria-checked="false"><span class="pill__knob"></span></button>
              </div>
              <div class="toggle-row" data-key="startWin">
                <span class="toggle-row__label">Start with Windows</span>
                <button class="pill" role="switch" aria-checked="false"><span class="pill__knob"></span></button>
              </div>
            </div>

            <div class="eyebrow">STEAM INSTALL PATH</div>
            <div class="path-row">
              <div class="path-field">
                <svg class="path-field__icon" viewBox="0 0 24 24" width="15" height="15" fill="none">
                  <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
                <span class="path-field__text">C:\Program Files (x86)\Steam</span>
              </div>
              <button class="browse" id="browse-btn">Browse</button>
            </div>

            <div class="eyebrow">THEME ACCENT</div>
            <div class="accents" id="accents">
              <button class="dot selected" data-rgb="102,192,244" style="--c:#66c0f4" aria-label="Blue"></button>
              <button class="dot" data-rgb="164,208,7" style="--c:#a4d007" aria-label="Green"></button>
              <button class="dot" data-rgb="177,140,255" style="--c:#b18cff" aria-label="Purple"></button>
              <button class="dot" data-rgb="244,162,89" style="--c:#f4a259" aria-label="Orange"></button>
            </div>

            <div class="eyebrow">ABOUT</div>
            <div class="about">
              <div class="about__title">Steam Account Switcher</div>
              <div class="about__sub">v1.0.0 · Made for gamers</div>
            </div>
          </div>

          <footer class="s-footer">
            <button class="save-btn" id="save-btn">Save</button>
          </footer>
        </section>
      </div>
    </div>
  </body>
</html>
